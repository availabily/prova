services:
  - type: web
    name: prova-engine
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn prova.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PROVA_VERSION
        value: 1.0.0
      - key: PROVA_BASE_URL
        value: https://prova.cobound.dev
      - key: DEMO_API_KEY
        value: prova-demo-key-public
      - key: ENVIRONMENT
        value: production
